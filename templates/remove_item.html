{% extends "layout.html" %}

{% block title %}Cinemapedia{% endblock %}

{% block content %}
<h2>Arvostelun poisto</h2>
<p>Arvostelu: {{ item.title }}</p>
<p>Haluatko varmasti poistaa tämän arvostelun, Men In Black style?</p>
<form action="/remove_item/{{ item.id }}" method="post">
    <input type="submit" name="remove" value="Haluan">
    <input type="submit" name="back" value="Eiku">
</form>
{% endblock %}
