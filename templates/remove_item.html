{% extends "layout.html" %}

{% block title %}Cinemapedia{% endblock %}

{% block content %}
<h2>{{ item.title }}</h2>
<h3>Arvostelun poisto</h3>
<p>Haluatko varmasti poistaa tämän arvostelun?</p>
<form action="/remove_item/{{ item.id }}" method="post">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" name="remove" value="Haluan">
    <input type="submit" name="back" value="Eiku">
</form>
<p>
    <a href="/item/{{ item.id }}">Takaisin ilmoitukseen</a>
</p>
{% endblock %}
